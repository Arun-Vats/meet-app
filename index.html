<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>VoiceLink</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ──────────────────────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}

:root{
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --bg:        #0a0a0f;
  --surface:   #13131a;
  --surface2:  #1c1c28;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --text:      #f0f0f8;
  --text2:     #8080a0;
  --text3:     #48485e;
  --accent:    #5b9cf6;
  --adim:      rgba(91,156,246,0.14);
  --green:     #32d583;
  --gdim:      rgba(50,213,131,0.14);
  --red:       #f2534a;
  --rdim:      rgba(242,83,74,0.14);
  --yellow:    #ffc940;
  --font:      'Outfit',sans-serif;
  --r-sm:      8px;
  --r-md:      14px;
  --r-lg:      20px;
  --r-full:    9999px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ── SCREENS ─────────────────────────────────────────────────────────────── */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:calc(var(--safe-t) + 24px) 28px calc(var(--safe-b) + 24px);
  opacity:0;pointer-events:none;
  transition:opacity .25s ease,transform .25s ease;
}
.screen.active{opacity:1;pointer-events:auto;transform:none!important}
.from-up  {transform:translateY(20px)}
.from-down{transform:translateY(-20px)}

/* ── WAITING SCREEN ──────────────────────────────────────────────────────── */
#s-wait{gap:0;text-align:center}

.logo{
  width:64px;height:64px;border-radius:20px;
  background:linear-gradient(135deg,var(--accent),#7b6cf6);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
  box-shadow:0 12px 40px rgba(91,156,246,.3);
}
.logo svg{width:30px;height:30px}

.wait-title{
  font-size:26px;font-weight:700;
  letter-spacing:-.04em;margin-bottom:10px;
}
.wait-sub{
  font-size:15px;color:var(--text2);
  line-height:1.55;max-width:260px;
  margin-bottom:36px;
}

/* room ID display */
.room-box{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r-md);
  padding:14px 18px;
  width:100%;max-width:320px;
  margin-bottom:12px;
}
.room-id{
  flex:1;font-size:15px;font-weight:500;
  color:var(--text);letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.copy-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text2);padding:2px;
  transition:color .15s;flex-shrink:0;
}
.copy-btn:hover{color:var(--accent)}
.copy-btn.copied{color:var(--green)}

.wait-hint{
  font-size:13px;color:var(--text3);
  margin-bottom:36px;
}

/* waiting indicator */
.waiting-dots{
  display:flex;align-items:center;gap:6px;
  margin-bottom:10px;
}
.waiting-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
  animation:dot-pulse 1.5s ease-in-out infinite;
}
.waiting-dots span:nth-child(2){animation-delay:.2s}
.waiting-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-pulse{
  0%,80%,100%{transform:scale(.6);opacity:.3}
  40%{transform:scale(1);opacity:1}
}
.waiting-label{font-size:13px;color:var(--text3)}

/* ── CALL SCREEN ─────────────────────────────────────────────────────────── */
#s-call{
  justify-content:space-between;
  background:var(--bg);
}

.call-top{
  width:100%;display:flex;
  align-items:center;justify-content:center;
  padding-top:8px;flex-shrink:0;
}
.timer-pill{
  background:var(--green);color:#fff;
  font-size:13px;font-weight:700;
  border-radius:var(--r-full);
  padding:5px 16px;
  letter-spacing:.05em;
  font-variant-numeric:tabular-nums;
  opacity:0;transition:opacity .4s,background .3s;
}
.timer-pill.on{opacity:1}

/* center */
.call-center{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;padding:12px 0;
}

/* animated circle */
.call-circle-wrap{
  position:relative;
  width:130px;height:130px;
  margin-bottom:28px;
}
.call-glow{
  position:absolute;inset:-24px;border-radius:50%;
  background:radial-gradient(circle,rgba(91,156,246,.1) 0%,transparent 68%);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{transform:scale(1);opacity:.8}
  50%{transform:scale(1.2);opacity:.3}
}
.call-circle{
  width:130px;height:130px;border-radius:50%;
  background:var(--surface2);
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.call-circle svg{width:48px;height:48px;opacity:.6}

/* speaking ring */
.speak-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:2.5px solid var(--green);
  box-shadow:0 0 20px rgba(50,213,131,.35);
  opacity:0;transition:opacity .22s;
  pointer-events:none;z-index:2;
}
.speak-ring.on{opacity:1}

.call-status{
  font-size:22px;font-weight:600;
  letter-spacing:-.03em;margin-bottom:8px;
  text-align:center;
}
.call-sub{
  font-size:14px;color:var(--text2);
  text-align:center;min-height:20px;
}

/* wave */
.wave{
  display:flex;align-items:center;gap:3px;
  height:24px;margin-top:18px;
  opacity:0;transition:opacity .35s;
}
.wave.on{opacity:1}
.wbar{
  width:3px;border-radius:2px;
  background:var(--green);height:4px;
  transition:height .08s ease;
}
.wave:not(.live) .wbar{animation:wave-idle 1.4s ease-in-out infinite}
.wave:not(.live) .wbar:nth-child(2){animation-delay:.12s}
.wave:not(.live) .wbar:nth-child(3){animation-delay:.24s}
.wave:not(.live) .wbar:nth-child(4){animation-delay:.36s}
.wave:not(.live) .wbar:nth-child(5){animation-delay:.24s}
.wave:not(.live) .wbar:nth-child(6){animation-delay:.12s}
.wave:not(.live) .wbar:nth-child(7){animation-delay:.06s}
@keyframes wave-idle{0%,100%{height:4px}50%{height:14px}}

/* quality */
.quality{
  display:flex;align-items:center;gap:7px;
  margin-top:14px;font-size:12px;color:var(--text3);
  opacity:0;transition:opacity .4s;
}
.quality.on{opacity:1}
.q-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  transition:background .4s;
}
.q-dot.relay{background:var(--yellow)}

/* controls */
.call-controls{
  width:100%;
  display:flex;align-items:center;justify-content:center;
  gap:24px;
  padding-bottom:calc(20px + var(--safe-b));
  flex-shrink:0;
}
.ctrl{
  display:flex;flex-direction:column;
  align-items:center;gap:8px;
  background:none;border:none;cursor:pointer;
  transition:transform .12s;
}
.ctrl:active{transform:scale(.88)}
.ctrl-circle{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);transition:background .18s,border-color .18s;
}
.ctrl-circle.active{background:var(--adim);border-color:var(--accent)}
.ctrl-circle.muted {background:var(--rdim);border-color:var(--red);color:var(--red)}
.ctrl-label{font-size:11px;color:var(--text3);font-weight:400}
.ctrl-end{
  width:68px;height:68px;border-radius:50%;
  background:var(--red);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(242,83,74,.42);
  transition:transform .12s,opacity .15s;
}
.ctrl-end:hover{opacity:.9}
.ctrl-end:active{transform:scale(.9)}

/* ── ERROR SCREEN ────────────────────────────────────────────────────────── */
#s-error{gap:16px;text-align:center}
.err-icon{font-size:48px}
.err-title{font-size:20px;font-weight:600;letter-spacing:-.03em}
.err-msg{font-size:14px;color:var(--text2);max-width:260px;line-height:1.55}
.btn-retry{
  margin-top:8px;
  background:var(--surface2);
  color:var(--text);border:1px solid var(--border2);
  border-radius:var(--r-md);padding:13px 28px;
  font-family:var(--font);font-size:15px;font-weight:500;
  cursor:pointer;transition:opacity .15s;
}
.btn-retry:hover{opacity:.8}

/* ── TOAST ───────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(24px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r-md);padding:10px 18px;
  font-size:13px;color:var(--text);white-space:nowrap;
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .2s,transform .2s;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.tok  {border-color:var(--green)}
.toast.terr {border-color:var(--red)}
</style>
</head>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
'use strict';

/* ══ CONFIG ══════════════════════════════════════════════════════════════════
   SIGNAL_URL: your Koyeb signaling server URL
   ══════════════════════════════════════════════════════════════════════════ */
const SIGNAL_URL = 'https://vocational-simone-aspandit374-66898499.koyeb.app';

/* ══ ROOM ID ══════════════════════════════════════════════════════════════════
   Read from URL: ?room=abc123
   If not present, generate a random one and redirect.
   This makes sharing simple — just copy the URL.
   ══════════════════════════════════════════════════════════════════════════ */
function getRoomId() {
  const params = new URLSearchParams(window.location.search);
  let room = params.get('room');
  if (!room) {
    // Generate a random readable room ID and redirect
    room = Math.random().toString(36).slice(2, 8) +
           Math.random().toString(36).slice(2, 8);
    const url = new URL(window.location.href);
    url.searchParams.set('room', room);
    window.history.replaceState({}, '', url.toString());
  }
  return room.trim().toLowerCase().slice(0, 64);
}

const ROOM_ID = getRoomId();

/* ══ ICE CONFIG ══════════════════════════════════════════════════════════════ */
const ICE = {
  iceServers: [
    { urls: 'stun:stun.cloudflare.com:3478' },
    { urls: 'stun:stun.l.google.com:19302'  },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    // TURN appended by fetchTurn() at call start
  ],
  iceTransportPolicy:   'all',
  bundlePolicy:         'max-bundle',
  rtcpMuxPolicy:        'require',
  iceCandidatePoolSize: 0,
};

/* ══ STATE ═══════════════════════════════════════════════════════════════════ */
let sock         = null;
let peer         = null;
let localStream  = null;
let myRole       = null;   // 'initiator' | 'responder'
let iceBuffer    = [];
let isMuted      = false;
let isSpeaker    = false;
let timerID      = null;
let timerSecs    = 0;
let audioCtx     = null;
let analyser     = null;
let rafID        = null;
let statsTimer   = null;

/* ══ UI HELPERS ══════════════════════════════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  requestAnimationFrame(() =>
    requestAnimationFrame(() =>
      document.getElementById(id).classList.add('active')
    )
  );
}

function showError(title, msg, retryable = true) {
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent   = msg;
  document.getElementById('retry-btn').style.display = retryable ? '' : 'none';
  show('s-error');
}

let toastT = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast' + (type ? ' t' + type : '');
  clearTimeout(toastT);
  requestAnimationFrame(() => el.classList.add('show'));
  toastT = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ══ ROOM ID DISPLAY ═════════════════════════════════════════════════════════ */
const fullLink = window.location.href;
document.getElementById('room-id-display').textContent = fullLink;

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(fullLink).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    toast('Link copied!', 'ok');
    setTimeout(() => btn.classList.remove('copied'), 2000);
  });
});

document.getElementById('retry-btn').addEventListener('click', () => {
  window.location.reload();
});

/* ══ TURN CREDENTIALS — fetched fresh per call ═══════════════════════════════ */
async function fetchTurn() {
  try {
    // Strip any existing TURN entries first
    ICE.iceServers = ICE.iceServers.filter(s => {
      const u = Array.isArray(s.urls) ? s.urls[0] : s.urls;
      return !u || !u.startsWith('turn:');
    });
    const res  = await fetch(SIGNAL_URL + '/turn');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data    = await res.json();
    const raw     = data.iceServers || data;
    const servers = Array.isArray(raw) ? raw : [raw];
    for (const s of servers) {
      if (!s.username || !s.credential) continue;
      const urls = Array.isArray(s.urls) ? s.urls : [s.urls];
      for (const url of urls) {
        if (!url.startsWith('turn:')) continue;       // UDP TURN only
        if (url.includes('transport=tcp')) continue;  // skip TCP TURN
        ICE.iceServers.push({ urls: url, username: s.username, credential: s.credential });
      }
    }
    console.log('[TURN] Ready. Servers:', ICE.iceServers.length);
  } catch (e) {
    console.warn('[TURN] Failed — STUN only:', e.message);
  }
}

/* ══ SOCKET ══════════════════════════════════════════════════════════════════ */
function connect() {
  document.getElementById('wait-label').textContent = 'Connecting to server…';

  sock = io(SIGNAL_URL, {
    transports:          ['websocket'],
    reconnection:        true,
    reconnectionAttempts:10,
    reconnectionDelay:   2000,
  });

  sock.on('connect', () => {
    console.log('[Socket] Connected:', sock.id);
    document.getElementById('wait-label').textContent = 'Waiting for peer…';
    sock.emit('join-room', { roomId: ROOM_ID });
  });

  sock.on('room-joined', async ({ role }) => {
    myRole = role;
    console.log('[Room] Joined as:', role);
    if (role === 'initiator') {
      document.getElementById('wait-label').textContent = 'Waiting for peer…';
    } else {
      // Responder: peer is already in the room.
      // Start RTC immediately so peer + mic are ready before offer arrives.
      document.getElementById('wait-label').textContent = 'Peer found — connecting…';
      show('s-call');
      document.getElementById('call-status').textContent = 'Connecting…';
      await startRTC(false);
    }
  });

  sock.on('room-full', ({ msg }) => {
    showError('Room Full', msg, false);
  });

  sock.on('room-invalid', ({ msg }) => {
    showError('Invalid Room', msg, true);
  });

  // Second peer joined — initiator starts WebRTC
  // Small delay gives responder time to call startRTC() and
  // get mic permission before the offer arrives.
  sock.on('peer-joined', async () => {
    console.log('[Room] Peer joined — starting RTC as initiator in 800ms.');
    document.getElementById('wait-label').textContent = 'Peer found — connecting…';
    show('s-call');
    document.getElementById('call-status').textContent = 'Connecting…';
    await new Promise(r => setTimeout(r, 800));
    await startRTC(true);
  });

  // Responder: received offer from initiator
  sock.on('rtc-offer', async ({ sdp }) => {
    // If peer doesn't exist yet (edge case), init it now
    if (!peer) {
      show('s-call');
      document.getElementById('call-status').textContent = 'Connecting…';
      await startRTC(false);
    }
    // Wait briefly if RTC just started and peer isn't fully ready
    let attempts = 0;
    while ((!peer || !peer.signalingState) && attempts++ < 20) {
      await new Promise(r => setTimeout(r, 100));
    }
    try {
      if (peer.signalingState !== 'stable' && peer.signalingState !== 'have-remote-offer') {
        await peer.setRemoteDescription(new RTCSessionDescription(sdp));
      } else if (peer.signalingState === 'stable') {
        await peer.setRemoteDescription(new RTCSessionDescription(sdp));
      }
      await flushIceBuffer();
      let answer = await peer.createAnswer();
      answer = { type: answer.type, sdp: opusMunge(answer.sdp) };
      await peer.setLocalDescription(answer);
      sock.emit('rtc-answer', { sdp: peer.localDescription });
    } catch (e) { console.error('[RTC] offer handler:', e); }
  });

  sock.on('rtc-answer', async ({ sdp }) => {
    if (!peer) return;
    try {
      await peer.setRemoteDescription(new RTCSessionDescription(sdp));
      await flushIceBuffer();
    } catch (e) { console.error('[RTC] answer handler:', e); }
  });

  sock.on('rtc-ice', async ({ candidate }) => {
    if (!peer || !peer.remoteDescription) {
      iceBuffer.push(candidate); return;
    }
    try { await peer.addIceCandidate(new RTCIceCandidate(candidate)); } catch (_) {}
  });

  // Other peer left or hung up
  sock.on('peer-left', () => {
    toast('Peer disconnected.');
    cleanupCall();
    // Go back to waiting
    document.getElementById('wait-label').textContent = 'Peer left — waiting for new peer…';
    show('s-wait');
    // Re-join the room
    if (sock.connected) sock.emit('join-room', { roomId: ROOM_ID });
  });

  sock.on('disconnect', () => {
    console.log('[Socket] Disconnected.');
    document.getElementById('wait-label').textContent = 'Reconnecting…';
  });

  sock.on('reconnect', () => {
    console.log('[Socket] Reconnected.');
    sock.emit('join-room', { roomId: ROOM_ID });
  });
}

/* ══ WebRTC ══════════════════════════════════════════════════════════════════ */
async function startRTC(asInitiator) {
  // Fetch fresh TURN credentials at call start
  await fetchTurn();

  // Get microphone
  if (!localStream) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: { ideal: true },
          noiseSuppression: { ideal: true },
          autoGainControl:  { ideal: true },
          sampleRate:       { ideal: 48000 },
          channelCount:     { ideal: 1 },
          latency:          { ideal: 0 },
        },
        video: false,
      });
    } catch (e) {
      showError('Microphone Denied',
        'Please allow microphone access in your browser settings, then reload.', true);
      return;
    }
  }

  peer    = new RTCPeerConnection(ICE);
  iceBuffer = [];

  localStream.getAudioTracks().forEach(t => peer.addTrack(t, localStream));

  // Trickle ICE
  peer.onicecandidate = ({ candidate }) => {
    if (!candidate) return;
    sock.emit('rtc-ice', { candidate: candidate.toJSON() });
    console.log('[ICE] Gathered:', candidate.type, candidate.protocol || '');
  };

  // ICE restart on failure — caller re-offers with fresh candidates
  let iceRestartDone = false;
  peer.oniceconnectionstatechange = () => {
    console.log('[ICE] State:', peer.iceConnectionState);
    if (peer.iceConnectionState === 'failed' && !iceRestartDone && peer) {
      iceRestartDone = true;
      console.log('[ICE] Failed — restarting.');
      if (asInitiator) {
        peer.createOffer({ iceRestart: true })
          .then(o => { o = { type: o.type, sdp: opusMunge(o.sdp) }; return peer.setLocalDescription(o); })
          .then(() => { sock.emit('rtc-offer', { sdp: peer.localDescription }); })
          .catch(e => console.warn('[ICE] Restart error:', e.message));
      } else {
        peer.restartIce();
      }
    }
  };

  // Connection state
  let connectTimeout = setTimeout(() => {
    if (peer && peer.connectionState !== 'connected') {
      showError('Connection Failed',
        'Could not establish a connection. Check your network and try again.', true);
      cleanupCall();
    }
  }, 15000);

  peer.onconnectionstatechange = () => {
    const st = peer.connectionState;
    console.log('[RTC] State:', st);
    if (st === 'connected') {
      clearTimeout(connectTimeout);
      onConnected();
    }
    if (st === 'disconnected') {
      document.getElementById('call-status').textContent = 'Reconnecting…';
      document.getElementById('call-timer').style.background = 'var(--yellow)';
      document.getElementById('wave').classList.remove('on');
    }
    if (st === 'failed') {
      clearTimeout(connectTimeout);
      showError('Connection Lost',
        'The call dropped. The other person may have lost connectivity.', true);
      cleanupCall();
    }
  };

  // Remote audio
  peer.ontrack = ({ streams }) => {
    const el = document.getElementById('remote-audio');
    el.srcObject = streams[0];
    el.play().catch(() => {});
    startAnalysis(streams[0]);
  };

  // Initiator sends offer
  if (asInitiator) {
    try {
      let offer = await peer.createOffer({ offerToReceiveAudio: true });
      offer = { type: offer.type, sdp: opusMunge(offer.sdp) };
      await peer.setLocalDescription(offer);
      sock.emit('rtc-offer', { sdp: peer.localDescription });
    } catch (e) { console.error('[RTC] createOffer:', e); }
  }
}

async function flushIceBuffer() {
  for (const c of iceBuffer) {
    try { await peer.addIceCandidate(new RTCIceCandidate(c)); } catch (_) {}
  }
  iceBuffer = [];
}

/* ══ SDP MUNGE — Safari safe ═════════════════════════════════════════════════ */
function opusMunge(sdp) {
  const match = sdp.match(/a=rtpmap:(\d+) opus\/48000/i);
  if (!match) return sdp;
  const pt     = match[1];
  const params = 'maxaveragebitrate=48000;stereo=0;useinbandfec=1;usedtx=0';
  const fmtpRe = new RegExp(`a=fmtp:${pt} (.*)`);
  if (fmtpRe.test(sdp)) {
    return sdp.replace(fmtpRe, (_, existing) => {
      const cleaned = existing.split(';')
        .filter(p => !/(maxaveragebitrate|stereo|useinbandfec|usedtx|cbr)/i.test(p.trim()))
        .filter(Boolean).join(';');
      return `a=fmtp:${pt} ${cleaned ? cleaned + ';' : ''}${params}`;
    });
  }
  // Safari: no existing fmtp — insert one
  return sdp.replace(
    new RegExp(`(a=rtpmap:${pt} opus[^\\n]*\\n)`),
    `$1a=fmtp:${pt} ${params}\n`
  );
}

/* ══ CONNECTED ═══════════════════════════════════════════════════════════════ */
function onConnected() {
  document.getElementById('call-status').textContent = 'Connected';
  document.getElementById('call-sub').textContent    = '';
  document.getElementById('call-timer').style.background = 'var(--green)';
  document.getElementById('call-timer').classList.add('on');
  document.getElementById('wave').classList.add('on');
  startTimer();
  startStats();
}

/* ══ CONTROLS ════════════════════════════════════════════════════════════════ */
document.getElementById('mute-btn').addEventListener('click', () => {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  document.getElementById('mute-circle').className = 'ctrl-circle' + (isMuted ? ' muted' : '');
  document.getElementById('mute-label').textContent = isMuted ? 'Unmute' : 'Mute';
});

document.getElementById('speaker-btn').addEventListener('click', () => {
  isSpeaker = !isSpeaker;
  document.getElementById('speaker-circle').className = 'ctrl-circle' + (isSpeaker ? ' active' : '');
  toast(isSpeaker ? 'Speaker on' : 'Speaker off');
});

document.getElementById('end-btn').addEventListener('click', () => {
  if (sock) sock.emit('leave-room');
  cleanupCall();
  document.getElementById('wait-label').textContent = 'Call ended — waiting for peer…';
  show('s-wait');
  if (sock && sock.connected) sock.emit('join-room', { roomId: ROOM_ID });
});

/* ══ CLEANUP ═════════════════════════════════════════════════════════════════ */
function cleanupCall() {
  stopTimer(); stopStats(); stopAnalysis();
  if (peer) {
    peer.ontrack = peer.onicecandidate =
    peer.onconnectionstatechange = peer.oniceconnectionstatechange = null;
    try { peer.close(); } catch (_) {}
    peer = null;
  }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  document.getElementById('remote-audio').srcObject = null;
  isMuted = false; isSpeaker = false; iceBuffer = [];
  document.getElementById('mute-circle').className  = 'ctrl-circle';
  document.getElementById('mute-label').textContent = 'Mute';
  document.getElementById('speaker-circle').className = 'ctrl-circle';
  document.getElementById('wave').classList.remove('on','live');
  document.getElementById('quality').classList.remove('on');
  document.getElementById('call-timer').classList.remove('on');
  document.getElementById('speak-ring').classList.remove('on');
  document.getElementById('call-timer').textContent = '0:00';
  document.getElementById('call-timer').style.background = 'var(--green)';
}

/* ══ TIMER ═══════════════════════════════════════════════════════════════════ */
function startTimer() {
  timerSecs = 0;
  const el  = document.getElementById('call-timer');
  timerID   = setInterval(() => {
    timerSecs++;
    el.textContent = `${Math.floor(timerSecs/60)}:${String(timerSecs%60).padStart(2,'0')}`;
  }, 1000);
}
function stopTimer() { clearInterval(timerID); timerID = null; timerSecs = 0; }

/* ══ REAL-TIME STATS (TURN usage) ════════════════════════════════════════════ */
function startStats() {
  document.getElementById('quality').classList.add('on');
  statsTimer = setInterval(pollStats, 2000);
  pollStats();
}
function stopStats() {
  clearInterval(statsTimer); statsTimer = null;
  document.getElementById('quality').classList.remove('on');
  document.getElementById('q-turn-usage').textContent = '';
}

async function pollStats() {
  if (!peer) return;
  try {
    const stats = await peer.getStats();
    let localType = null, remoteType = null;
    let audioRx = 0, audioTx = 0;

    stats.forEach(r => {
      if (r.type === 'candidate-pair' && r.nominated && r.state === 'succeeded') {
        const lc = stats.get(r.localCandidateId);
        const rc = stats.get(r.remoteCandidateId);
        localType  = lc ? lc.candidateType : null;
        remoteType = rc ? rc.candidateType : null;
      }
      if (r.type === 'inbound-rtp'  && r.kind === 'audio') audioRx = r.bytesReceived || 0;
      if (r.type === 'outbound-rtp' && r.kind === 'audio') audioTx = r.bytesSent     || 0;
    });

    const relay = localType === 'relay' || remoteType === 'relay';
    const dot   = document.getElementById('q-dot');
    const text  = document.getElementById('q-text');
    const usage = document.getElementById('q-turn-usage');

    if (localType) {
      if (relay) {
        const who = localType === 'relay' && remoteType === 'relay' ? 'Both via TURN'
                  : localType  === 'relay' ? 'You via TURN' : 'Them via TURN';
        dot.className    = 'q-dot relay';
        text.textContent = who;
        usage.textContent = '· ~' + fmtBytes(audioRx + audioTx) + ' via TURN';
      } else {
        dot.className    = 'q-dot';
        text.textContent = 'Direct P2P';
        usage.textContent = '';
      }
    }
  } catch (_) {}
}

function fmtBytes(b) {
  if (b < 1024)        return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

/* ══ AUDIO ANALYSIS (speaking indicator) ═════════════════════════════════════ */
function startAnalysis(stream) {
  try {
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
    const src = audioCtx.createMediaStreamSource(stream);
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.72;
    src.connect(analyser);
    const data  = new Uint8Array(analyser.frequencyBinCount);
    const wave  = document.getElementById('wave');
    const ring  = document.getElementById('speak-ring');
    const bars  = wave.querySelectorAll('.wbar');
    let speaking = false, silT = null;
    function tick() {
      rafID = requestAnimationFrame(tick);
      analyser.getByteFrequencyData(data);
      const vol = data.reduce((a, b) => a + b, 0) / data.length;
      if (vol > 14) {
        clearTimeout(silT);
        if (!speaking) { speaking = true; wave.classList.add('live'); ring.classList.add('on'); }
        bars.forEach((b, i) => {
          b.style.height = (4 + Math.round((data[Math.floor(i/bars.length*data.length*.38)]/255)*18)) + 'px';
        });
      } else if (speaking) {
        silT = setTimeout(() => {
          speaking = false; wave.classList.remove('live'); ring.classList.remove('on');
          bars.forEach(b => b.style.height = '4px');
        }, 420);
      }
    }
    tick();
  } catch (e) { console.warn('[Analysis]', e.message); }
}

function stopAnalysis() {
  if (rafID)    { cancelAnimationFrame(rafID); rafID = null; }
  if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
  analyser = null;
}

/* ══ INIT ═════════════════════════════════════════════════════════════════════ */
window.addEventListener('beforeunload', () => {
  if (sock) sock.emit('leave-room');
});

connect();
</script>
